# Gitleaks configuration for worktree-manager
# https://github.com/gitleaks/gitleaks
# Auto-generated by pheno-cli bootstrap

[allowlist]
  description = "Public placeholders and examples"
  files = [
    "^\\.env\\.example$",
    "^\\.env\\.template$",
    "^\\.env\\.local\\.example$",
    "^docs/.*$",
    "^\\.github/.*$",
    "^.*\\.md$",
    "^test.*$",
    "^.*_test\\.py$",
    "^.*_test\\.go$",
    "^tests/.*$"
  ]

  # Allow known test/dev placeholder patterns
  regexes = [
    "^agileplus-dev$",
    "^dev-secret-key-change-in-prod$",
    "^your-.+-here$",
    "^CHANGE_ME_IN_PROD$",
    "^PLACEHOLDER_",
    "^test-secret$",
    "^example-key$",
    "^dummy-token$",
    "^fake-api-key$"
  ]

[[rules]]
  id = "openrouter-api-key"
  description = "OpenRouter API Key"
  regex = '''sk-or-v1-[a-f0-9]{32,}'''
  tags = ["apikey", "openrouter"]
  entropy = 4.5

[[rules]]
  id = "openai-api-key"
  description = "OpenAI API Key"
  regex = '''sk-[a-zA-Z0-9]{48}'''
  tags = ["apikey", "openai"]
  entropy = 4.5

[[rules]]
  id = "anthropic-api-key"
  description = "Anthropic API Key"
  regex = '''sk-ant-[a-zA-Z0-9]{32,}'''
  tags = ["apikey", "anthropic"]
  entropy = 4.5

[[rules]]
  id = "github-oauth-token"
  description = "GitHub OAuth Token"
  regex = '''ghp_[a-zA-Z0-9]{36,}'''
  tags = ["apikey", "github"]
  entropy = 4.5

[[rules]]
  id = "github-fine-grained-pat"
  description = "GitHub Fine-Grained PAT"
  regex = '''github_pat_[a-zA-Z0-9_]{22,}'''
  tags = ["apikey", "github"]
  entropy = 4.5

[[rules]]
  id = "github-app-token"
  description = "GitHub App Token"
  regex = '''ghs_[a-zA-Z0-9]{36}'''
  tags = ["apikey", "github"]
  entropy = 4.5

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret)[\s]*[=:]+[\s]*['"]?[a-zA-Z0-9_-]{20,}['"]?'''
  tags = ["apikey", "generic"]
  entropy = 4.0

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''AKIA[0-9A-Z]{16}'''
  tags = ["aws", "apikey"]
  entropy = 4.0

[[rules]]
  id = "aws-secret-key"
  description = "AWS Secret Key"
  regex = '''[0-9a-zA-Z/+]{40}'''
  tags = ["aws", "secret"]
  entropy = 4.5
  secretGroup = 1

[[rules]]
  id = "slack-token"
  description = "Slack Token"
  regex = '''xox[baprs]-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*'''
  tags = ["slack", "token"]
  entropy = 4.0

[[rules]]
  id = "slack-webhook"
  description = "Slack Webhook"
  regex = '''https://hooks\.slack\.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8,}/[a-zA-Z0-9_]{24}'''
  tags = ["slack", "webhook"]

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'''
  tags = ["privatekey", "crypto"]

[[rules]]
  id = "jwt-token"
  description = "JWT Token"
  regex = '''eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*'''
  tags = ["jwt", "token"]
  entropy = 4.0



[[rules]]
  id = "database-url"
  description = "Database URL with credentials"
  regex = '''(?i)(postgres|mysql|mongodb)://[^:]+:[^@]+@'''
  tags = ["database", "connection"]
  entropy = 4.0
