[default.extend-words]
# Add project-specific words that typos should not flag
agileplus = "agileplus"
RTO = "RTO"
unparseable = "unparseable"

[files]
extend-exclude = [
    "*.lock",
    "target/",
    "*.pyc",
    "__pycache__/",
    "python/src/gen/",
    "rust/src/gen/",
    "pheno-cli/go.mod",
    "templates/static/*.min.js",
]
